name: Deploy Hugo to GHP and LaTeX to GH releases
on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'

      - name: Build
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy-web:
    needs: build-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install Jinja2 PyYAML

      - name: Generate TeX files
        run: python generate_latex_cv.py

      - name: Compile English PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv_en.tex

      - name: Compile Italian PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv_it.tex

      - name: Upload PDF Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CV-PDFs
          path: cv_*.pdf

      - name: Generate Tag Name
        id: vars
        run: |
          TAG="v$(date +'%Y.%m.%d-%H%M')"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: "CV Release ${{ steps.vars.outputs.tag }}"
          files: |
            cv_en.pdf
            cv_it.pdf
          body: "Automated CV build for both English and Italian versions."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
